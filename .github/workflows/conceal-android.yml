name: Conceal Android

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c
          add-to-path: true
          link-to-sdk: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Write build environment
        run: printf '{"APP_ENV":"stable"}\n' > env.json

      - name: Build arm64 APK
        env:
          ANDROID_ARCH: arm64
        run: |
          flutter build apk \
            --release \
            --target-platform android-arm64 \
            --dart-define-from-file=env.json

      - name: Package SukiSU module
        run: bash ./tools/package-root-module.sh

      - name: Collect artifacts
        run: |
          mkdir -p dist
          version="${GITHUB_REF_NAME#v}"
          if [ -z "$version" ] || [ "$version" = "$GITHUB_REF_NAME" ]; then
            version="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)"
          fi
          cp build/app/outputs/flutter-apk/app-release.apk "dist/conceal-flclash-android-v${version}-arm64-v8a.apk"
          cp build/root-module/conceal-flclash-tun-helper.zip "dist/conceal-flclash-tun-helper-v${version}.zip"
          (cd dist && sha256sum * > SHA256SUMS)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: conceal-flclash-android
          path: dist/*
